<h2>{{ isEditMode ? 'Edit Task' : 'Add New Task' }}</h2>

<form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="mt-4">
  <div class="mb-3">
    <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
    <input 
      type="text" 
      id="title" 
      class="form-control" 
      formControlName="title"
      [class.is-invalid]="submitted && f['title'].errors">
    <div class="invalid-feedback" *ngIf="submitted && f['title'].errors">
      <div *ngIf="f['title'].errors['required']">Title is required</div>
    </div>
  </div>

  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <textarea 
      id="description" 
      class="form-control" 
      rows="4" 
      formControlName="description"></textarea>
  </div>

  <div class="mb-3">
    <label for="status" class="form-label">Status <span class="text-danger">*</span></label>
    <select 
      id="status" 
      class="form-select" 
      formControlName="status">
      <option [value]="0">Pending</option>
      <option [value]="1">In Progress</option>
      <option [value]="2">Completed</option>
    </select>
  </div>

  <div class="mb-3">
    <label for="dueDate" class="form-label">Due Date</label>
    <input 
      type="date" 
      id="dueDate" 
      class="form-control" 
      formControlName="dueDate">
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary" [disabled]="submitted && taskForm.invalid">Save</button>
    <a routerLink="/tasks" class="btn btn-secondary">Cancel</a>
  </div>
</form>
