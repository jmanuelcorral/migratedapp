<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Task List</h2>
  <a routerLink="/tasks/new" class="btn btn-success">Add New Task</a>
</div>

<div class="mb-3">
  <label for="statusFilter" class="form-label">Filter by Status:</label>
  <select 
    id="statusFilter" 
    class="form-select" 
    style="max-width: 200px;"
    [(ngModel)]="filterStatus" 
    (change)="onFilterChange()">
    <option value="all">All</option>
    <option value="0">Pending</option>
    <option value="1">In Progress</option>
    <option value="2">Completed</option>
  </select>
</div>

<div class="table-responsive">
  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Status</th>
        <th>Due Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let task of filteredTasks">
        <td>{{ task.id }}</td>
        <td>{{ task.title }}</td>
        <td><span [ngClass]="getStatusBadgeClass(task.status)">{{ task.statusText }}</span></td>
        <td>{{ formatDate(task.dueDate) }}</td>
        <td>
          <a [routerLink]="['/tasks', task.id, 'edit']" class="btn btn-sm btn-primary me-2">Edit</a>
          <button (click)="deleteTask(task)" class="btn btn-sm btn-danger">Delete</button>
        </td>
      </tr>
      <tr *ngIf="filteredTasks.length === 0">
        <td colspan="5" class="text-center text-muted">No tasks found</td>
      </tr>
    </tbody>
  </table>
</div>
